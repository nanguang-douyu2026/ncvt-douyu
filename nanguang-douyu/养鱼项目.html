<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四月好运鱼 | 南职大专属</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .header {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            padding: 30px 20px;
            color: white;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 16px;
            opacity: 0.9;
        }

        .content {
            padding: 30px 20px;
        }

        .event-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .offer {
            background: #fff0f5;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .offer-title {
            color: #d63384;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .offer-list {
            text-align: left;
            color: #333;
            line-height: 1.8;
        }

        .offer-list li {
            margin-bottom: 8px;
            list-style: none;
            position: relative;
            padding-left: 20px;
        }

        .offer-list li::before {
            content: "🎁";
            position: absolute;
            left: 0;
        }

        .contact {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
        }

        .contact-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .wechat {
            font-size: 16px;
            color: #722ed1;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .tips {
            font-size: 12px;
            color: #6c757d;
            line-height: 1.5;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #adb5bd;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="title">四月好运鱼</div>
        <div class="subtitle">南职大校园专属活动</div>
    </div>
    <div class="content">
        < img src="fish2.jpg" alt="美丽的斗鱼" class="event-image">
        
        <div class="offer">
            <div class="offer-title">🎊 开学福利，限时放送 🎊</div>
            <ul class="offer-list">
                <li>马尾斗鱼 <strong>9.9元</strong> 限时秒杀！</li>
                <li>购买任意斗鱼，<strong>送鱼食+水质稳定剂</strong>！</li>
                <li>鱼缸套装立减<strong>10元</strong>，到手价仅<strong>29.9元</strong>！</li>
                <li>三人团购，每人再<strong>送神秘小礼物</strong>一份！</li>
            </ul>
        </div>

        <div class="contact">
            <div class="contact-title">📲 立即预定，开启好运</div>
            <div class="wechat">微信：zc2006AAA</div>
            <div class="tips">📍 自提地点：南宁职业技术大学<br>✅ 包活到手，养鱼问题随时问</div>
        </div>

        <div class="footer">活动最终解释权归本店所有</div>
    </div>
</div>

</body>
</html>
